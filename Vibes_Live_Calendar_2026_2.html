<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Vibes Events - Live Project Calendar 2026</title>
<style>*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}body{background:#f4f6f9;padding:16px}h2{color:#1a1a2e;font-size:18px;margin-bottom:4px}.subtitle{color:#666;font-size:12px;margin-bottom:12px}.controls{background:white;border-radius:10px;padding:12px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;flex-wrap:wrap;gap:10px;align-items:center}.btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}.btn-nav{background:#3498db;color:white}.btn-refresh{background:#27ae60;color:white}.month-label{font-size:13px;font-weight:700;color:#1a1a2e;min-width:160px;text-align:center}.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}.legend-dot{width:14px;height:14px;border-radius:3px}.status-bar{background:#e8f4fd;border:1px solid #bee3f8;border-radius:8px;padding:8px 14px;font-size:12px;color:#2176ae;margin-bottom:12px}.calendar-wrap{background:white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow-x:auto;overflow-y:auto;max-height:70vh}table{border-collapse:collapse;min-width:900px;width:100%}.header-row th{background:#1a1a2e;color:white;padding:6px 3px;font-size:11px;text-align:center;border-right:1px solid #2d2d4e;min-width:28px;position:sticky;top:0;z-index:20}.header-row th:first-child{text-align:left;padding-left:10px;min-width:200px;position:sticky;left:0;z-index:30}.header-row th.today-col{background:#e67e22}.header-row th.weekend-col{background:#2d2d4e}.month-row td{background:#e8eaf0;color:#333;font-size:10px;font-weight:700;text-align:center;padding:3px;border-right:1px solid #d0d4e0;position:sticky;top:52px;z-index:20}.month-row td:first-child{text-align:left;padding-left:10px;position:sticky;left:0;z-index:25;background:#e8eaf0}.division-row td{background:#f0f2f8;font-weight:700;font-size:12px;padding:6px 10px;color:#1a1a2e;border-top:2px solid #dde1eb}.division-row td:first-child{position:sticky;left:0;z-index:5}tr.project-row td{border-bottom:1px solid #f0f2f7}tr.project-row:hover td{background:#f5f7ff}.project-name-cell{padding:4px 10px;color:#333;font-size:11px;white-space:nowrap;min-width:200px;position:sticky;left:0;background:white;z-index:5}.incharge{font-size:10px;color:#999;font-style:italic}.city-badge{display:inline-block;background:#eef0f8;color:#555;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:4px}.day-cell{padding:2px;text-align:center;border-right:1px solid #f0f2f7;position:relative;min-width:28px;height:32px;vertical-align:middle}.day-cell.today-day{background:#fff8f0;border-right:2px solid #e67e22}.day-cell.weekend-day{background:#fafafa}.bar{height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;padding:0 3px;cursor:pointer}.bar:hover{opacity:.8}.bar-start{border-radius:10px 2px 2px 10px}.bar-end{border-radius:2px 10px 10px 2px}.bar-single{border-radius:10px}.overlap-dot{position:absolute;top:1px;right:1px;width:6px;height:6px;background:#e74c3c;border-radius:50%}.tooltip{position:fixed;background:#1a1a2e;color:white;padding:8px 12px;border-radius:8px;font-size:11px;pointer-events:none;z-index:9999;display:none;line-height:1.8;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:300px}.filter-select{padding:5px 9px;border:1px solid #dde;border-radius:6px;font-size:12px}.loading{text-align:center;padding:40px;color:#888;font-size:14px}</style>
</head><body>
<h2>Vibes Events - Live Project Calendar 2026</h2>
<p class="subtitle">Data loads live from Google Sheets - refresh anytime to see latest updates</p>
<div class="controls">
<button class="btn btn-nav" onclick="shiftMonth(-1)">Prev</button>
<span class="month-label" id="monthLabel"></span>
<button class="btn btn-nav" onclick="shiftMonth(1)">Next</button>
<button class="btn btn-refresh" onclick="loadData()">Refresh Data</button>
<select class="filter-select" id="filterDiv" onchange="render()">
<option value="ALL">All Divisions</option>
<option value="FOH AUH">FOH AUH</option>
<option value="FOH DXB">FOH DXB</option>
<option value="HO">HO</option>
<option value="Hospitality">Hospitality</option>
<option value="TA">TA</option>
</select>
</div>
<div class="status-bar" id="statusBar">Loading...</div>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#3498db"></div>FOH AUH</div>
<div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div>FOH DXB</div>
<div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>HO</div>
<div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>Hospitality</div>
<div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>TA</div>
</div>
<div class="calendar-wrap">
<div class="loading" id="loadingMsg">Loading projects...</div>
<table id="calTable" style="display:none"></table>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const API='https://script.google.com/macros/s/AKfycbxKRFMMG9aBd9sGKllg5nR6jnw_dtPAqM8aDtNMjNMxVvxqt1QiLWtnrA0wt5n9pxxA/exec';
const COLORS={'FOH AUH':'#3498db','FOH DXB':'#9b59b6','HO':'#27ae60','Hospitality':'#e67e22','TA':'#c0392b'};
const DIVISIONS=['FOH AUH','FOH DXB','HO','Hospitality','TA'];
const TODAY=new Date();TODAY.setHours(0,0,0,0);
let viewStart=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let projects=[];
function parseDate(s){
  if(!s) return null;
  s = String(s).trim();
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return new Date(+m[3], +m[2]-1, +m[1]);
  var d = new Date(s);
  return isNaN(d) ? null : d;
}
async function loadData(){
  document.getElementById('statusBar').textContent='Loading...';
  document.getElementById('loadingMsg').style.display='block';
  document.getElementById('calTable').style.display='none';
  try{
    const res=await fetch(API);
    const data=await res.json();
    projects=data.filter(r=>r['Division']&&r['Project Name']).map(r=>{
      const s=parseDate(r['Start Date']),e=parseDate(r['End Date']);
      if(!s||!e)return null;
      return{div:String(r['Division']).trim(),name:String(r['Project Name']).trim(),city:r['City']||'',venue:r['Venue']||'',org:r['Organizer']||'',s,e,ic:r['Project Incharge']||'',onsite:r['Onsite Incharge']||'',status:r['Status']||'Confirmed',notes:r['Notes']||''};
    }).filter(Boolean);
    document.getElementById('statusBar').textContent=projects.length+' projects loaded - '+new Date().toLocaleString('en-GB');
    document.getElementById('loadingMsg').style.display='none';
    document.getElementById('calTable').style.display='';
    render();
  }catch(err){document.getElementById('statusBar').textContent='Error: '+err.message;}
}
function dk(d){return d instanceof Date?d.toISOString().split('T')[0]:'';}
function getDays(){const days=[],end=new Date(viewStart.getFullYear(),viewStart.getMonth()+2,0);for(let d=new Date(viewStart);d<=end;d.setDate(d.getDate()+1))days.push(new Date(d));return days;}
function updateMonthLabel(){const m2=new Date(viewStart.getFullYear(),viewStart.getMonth()+1,1);document.getElementById('monthLabel').textContent=viewStart.toLocaleString('default',{month:'long',year:'numeric'})+' - '+m2.toLocaleString('default',{month:'long',year:'numeric'});}
function shiftMonth(n){viewStart.setMonth(viewStart.getMonth()+n);render();}
function render(){if(!projects.length)return;updateMonthLabel();const days=getDays(),filterDiv=document.getElementById('filterDiv').value,table=document.getElementById('calTable');table.innerHTML='';const activeDivs=filterDiv==='ALL'?DIVISIONS:[filterDiv];const om={};activeDivs.forEach(div=>{const dp=projects.filter(p=>p.div===div&&p.status!=='Cancelled'&&p.e>=viewStart);days.forEach(day=>{if(dp.filter(p=>day>=p.s&&day<=p.e).length>1)om[div+'_'+dk(day)]=true;});});const hRow=table.insertRow();hRow.className='header-row';const hTh=document.createElement('th');hTh.textContent='Project / Incharge';hRow.appendChild(hTh);days.forEach(day=>{const th=document.createElement('th');th.innerHTML='<div style="font-size:11px;font-weight:700">'+day.getDate()+'</div><div style="font-size:9px;opacity:0.8">'+day.toLocaleString('default',{weekday:'short'}).toUpperCase()+'</div>';if(dk(day)===dk(TODAY))th.className='today-col';else if(day.getDay()===5||day.getDay()===6)th.className='weekend-col';hRow.appendChild(th);});const mRow=table.insertRow();mRow.className='month-row';const mTd=document.createElement('td');mTd.textContent='';mRow.appendChild(mTd);days.forEach(day=>{const td=document.createElement('td');if(day.getDate()===1)td.textContent=day.toLocaleString('default',{month:'long'}).toUpperCase();mRow.appendChild(td);});activeDivs.forEach(div=>{const dp=projects.filter(p=>p.div===div&&p.status!=='Cancelled'&&p.e>=viewStart);if(!dp.length)return;const dRow=table.insertRow();dRow.className='division-row';const dtd=document.createElement('td');dtd.colSpan=days.length+1;dtd.innerHTML='<span style="color:'+(COLORS[div]||'#888')+'">&#9679;</span> '+div+' <span style="font-weight:400;font-size:11px;color:#888">('+dp.length+' projects)</span>';dRow.appendChild(dtd);dp.forEach(proj=>{const row=table.insertRow();row.className='project-row';const nc=document.createElement('td');nc.className='project-name-cell';nc.innerHTML=proj.name+' <span class="city-badge">'+proj.city+'</span><br><span class="incharge">'+(proj.ic||'-')+' | '+(proj.onsite||'-')+'</span>';row.appendChild(nc);days.forEach(day=>{const cell=document.createElement('td');cell.className='day-cell'+(dk(day)===dk(TODAY)?' today-day':'')+(day.getDay()===5||day.getDay()===6?' weekend-day':'');if(day>=proj.s&&day<=proj.e){const iS=dk(day)===dk(proj.s),iE=dk(day)===dk(proj.e),iSi=dk(proj.s)===dk(proj.e);const bar=document.createElement('div');bar.className='bar '+(iSi?'bar-single':iS?'bar-start':iE?'bar-end':'');bar.style.background=COLORS[proj.div]||'#888';if(iS||iSi)bar.textContent=proj.ic||'';if(om[div+'_'+dk(day)]){const dot=document.createElement('div');dot.className='overlap-dot';cell.appendChild(dot);}bar.onmouseenter=function(e){const t=document.getElementById('tooltip');t.innerHTML='<strong>'+proj.name+'</strong><br>'+proj.city+' | '+proj.venue+'<br>'+proj.org+'<br>'+dk(proj.s)+' to '+dk(proj.e)+'<br>'+(proj.ic||'-')+' | '+(proj.onsite||'-')+'<br>Status:'+proj.status;t.style.display='block';};bar.onmousemove=function(e){const t=document.getElementById('tooltip');t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-10)+'px';};bar.onmouseleave=function(){document.getElementById('tooltip').style.display='none';};cell.appendChild(bar);}row.appendChild(cell);});});});}
loadData();
</script>
</body></html>
